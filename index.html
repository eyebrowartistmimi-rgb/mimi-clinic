<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提携クリニック一覧 | MIMI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+JP:wght@200;300;400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --mocha: #b09080;
  --mocha-dark: #8a6f5a;
  --mocha-light: #d4c0b0;
  --gold: #c8a96e;
  --gold-light: #e8d4a8;
  --cream: #f8f4ef;
  --cream-dark: #f0e8e0;
  --white: #fdfcfb;
  --text: #3a2e28;
  --text-muted: #7a6a60;
  --text-light: #a8988e;
  --border: rgba(180,150,120,0.25);
  --border-gold: rgba(200,169,110,0.4);
}

html { scroll-behavior: smooth; }

body {
  background: var(--cream);
  color: var(--text);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  line-height: 1.8;
}

/* ── Marble SVG background ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(255,248,240,0.9) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 90%, rgba(200,169,110,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 30%, rgba(176,144,128,0.06) 0%, transparent 40%);
  pointer-events: none;
  z-index: 0;
}

/* Marble vein lines via SVG filter */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(125deg, transparent 30%, rgba(200,169,110,0.07) 31%, rgba(200,169,110,0.04) 33%, transparent 34%),
    linear-gradient(55deg, transparent 55%, rgba(180,150,120,0.05) 56%, rgba(180,150,120,0.03) 58%, transparent 59%),
    linear-gradient(170deg, transparent 10%, rgba(200,169,110,0.06) 11%, transparent 13%),
    linear-gradient(15deg, transparent 70%, rgba(180,150,120,0.04) 71%, transparent 73%);
  pointer-events: none;
  z-index: 0;
}

/* ── Header ── */
header {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 5rem 1.5rem 4rem;
  background: linear-gradient(180deg, rgba(253,252,251,0.95) 0%, rgba(248,244,239,0.85) 100%);
  border-bottom: 1px solid var(--border-gold);
}

.header-inner { position: relative; display: inline-block; }

.header-label {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 0.45em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 1.25rem;
  display: block;
}

.header-title {
  font-family: 'Noto Serif JP', serif;
  font-weight: 200;
  font-size: 30px;
  letter-spacing: 0.2em;
  color: var(--text);
  margin-bottom: 0.75rem;
  line-height: 1.4;
}

.header-title-en {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 12px;
  letter-spacing: 0.4em;
  color: var(--text-light);
  text-transform: uppercase;
  display: block;
  margin-bottom: 1.5rem;
}

.header-ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 0 auto;
}

.ornament-line {
  width: 40px;
  height: 0.5px;
  background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
}

.ornament-diamond {
  width: 5px;
  height: 5px;
  background: var(--gold);
  transform: rotate(45deg);
  opacity: 0.7;
}

/* ── Container ── */
.container {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 3rem 1.5rem 6rem;
}

/* ── Filter bar ── */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-bottom: 3.5rem;
}

.filter-btn {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.15em;
  padding: 7px 22px;
  border: 0.5px solid var(--border-gold);
  border-radius: 50px;
  background: rgba(255,255,255,0.6);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.25s ease;
  backdrop-filter: blur(4px);
}

.filter-btn:hover {
  background: rgba(255,255,255,0.9);
  border-color: var(--gold);
  color: var(--mocha-dark);
}

.filter-btn.active {
  background: linear-gradient(135deg, var(--mocha) 0%, var(--mocha-dark) 100%);
  color: rgba(255,255,255,0.95);
  border-color: transparent;
  box-shadow: 0 4px 16px rgba(138,111,90,0.3);
}

/* ── Pref section ── */
.pref-section {
  margin-bottom: 3rem;
  animation: fadeUp 0.4s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.pref-heading-wrap {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 1.5rem;
}

.pref-heading {
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.3em;
  color: var(--mocha);
  white-space: nowrap;
}

.pref-heading-line {
  flex: 1;
  height: 0.5px;
  background: linear-gradient(90deg, var(--border-gold), transparent);
}

/* ── Clinic grid ── */
.clinic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}

/* Marble card */
.clinic-card {
  position: relative;
  overflow: hidden;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(248,242,236,0.9) 50%, rgba(240,232,222,0.88) 100%);
  border: 0.5px solid var(--border-gold);
  border-radius: 4px;
  padding: 1.5rem 1.5rem 1.25rem;
  transition: all 0.3s ease;
  display: flex;
  flex-direction: column;
}

/* Marble vein on card */
.clinic-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(115deg, transparent 40%, rgba(200,169,110,0.06) 41%, rgba(200,169,110,0.03) 43%, transparent 44%),
    linear-gradient(60deg, transparent 60%, rgba(180,150,120,0.04) 61%, transparent 63%);
  pointer-events: none;
}

/* Gold corner accent */
.clinic-card::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 40px; height: 40px;
  background: linear-gradient(225deg, rgba(200,169,110,0.2) 0%, transparent 60%);
  pointer-events: none;
}

.clinic-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(138,111,90,0.15);
  border-color: rgba(200,169,110,0.6);
}

.clinic-name {
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  font-size: 15px;
  letter-spacing: 0.1em;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 1rem;
  position: relative;
}

/* Thin gold underline under name */
.clinic-name-line {
  width: 24px;
  height: 0.5px;
  background: linear-gradient(90deg, var(--gold), transparent);
  margin: 6px 0 1rem;
}

.clinic-addr-block {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 0.875rem 0;
  border-top: 0.5px solid var(--border);
  border-bottom: 0.5px solid var(--border);
  position: relative;
}

.addr-icon {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  margin-top: 2px;
  opacity: 0.5;
  color: var(--mocha);
}

.clinic-addr-text {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.8;
  letter-spacing: 0.03em;
}

.btn-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 1rem;
}

.map-link, .site-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-decoration: none;
  border-radius: 2px;
  padding: 5px 14px;
  transition: all 0.2s ease;
  position: relative;
}

.map-link {
  background: linear-gradient(135deg, var(--mocha) 0%, var(--mocha-dark) 100%);
  color: rgba(255,255,255,0.92);
  border: none;
}

.map-link:hover {
  box-shadow: 0 3px 12px rgba(138,111,90,0.35);
  transform: translateY(-1px);
}

.site-link {
  background: transparent;
  color: var(--mocha);
  border: 0.5px solid var(--border-gold);
}

.site-link:hover {
  background: rgba(200,169,110,0.08);
  border-color: var(--gold);
}

.btn-icon {
  width: 12px;
  height: 12px;
  opacity: 0.85;
}

.pref-tag {
  display: inline-block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px;
  letter-spacing: 0.18em;
  padding: 3px 12px;
  border: 0.5px solid var(--border-gold);
  color: var(--text-light);
  margin-top: 0.875rem;
  align-self: flex-start;
  text-transform: uppercase;
}

/* ── Empty ── */
.empty {
  text-align: center;
  padding: 5rem 0;
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  letter-spacing: 0.15em;
  color: var(--text-light);
}

/* ── Footer ── */
footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 2.5rem;
  border-top: 0.5px solid var(--border-gold);
  background: linear-gradient(0deg, rgba(248,244,239,0.9) 0%, transparent 100%);
}

.footer-ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 1rem;
}

.footer-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--text-light);
}

/* ── Mobile ── */
@media (max-width: 520px) {
  header { padding: 3.5rem 1rem 3rem; }
  .header-title { font-size: 22px; }
  .container { padding: 2.5rem 1rem 4rem; }
  .clinic-grid { grid-template-columns: 1fr; }
  .filter-btn { font-size: 12px; padding: 6px 16px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="header-label">Partner Clinic</span>
    <h1 class="header-title">提携クリニック一覧</h1>
    <span class="header-title-en">Clinic List</span>
    <div class="header-ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line"></div>
    </div>
  </div>
</header>

<main class="container">
  <nav class="filter-bar" id="filters" aria-label="エリアフィルター"></nav>
  <div id="list" role="region" aria-live="polite"></div>
</main>

<footer>
  <div class="footer-ornament">
    <div class="ornament-line"></div>
    <div class="ornament-diamond"></div>
    <div class="ornament-line"></div>
  </div>
  <p class="footer-text">&copy; MIMI. All rights reserved.</p>
</footer>

<script>
const clinics = [
  {
    pref: "北海道",
    name: "リアンクリニック",
    addr: "札幌市豊平区美園５条２丁目２−１８",
    map: "https://maps.google.com/?q=北海道札幌市豊平区美園５条２丁目２−１８",
    url: null
  },
  {
    pref: "千葉",
    name: "ともこ皮フクリニック",
    addr: "佐倉市染井野５丁目３０−１",
    map: "https://maps.google.com/?q=千葉県佐倉市染井野５丁目３０−１",
    url: null
  },
  {
    pref: "東京",
    name: "A.R.Tクリニック新宿南口",
    addr: "新宿区西新宿１丁目１８−５ ７階",
    map: "https://maps.google.com/?q=東京都新宿区西新宿１丁目１８−５",
    url: null
  },
  {
    pref: "横浜",
    name: "ティファクリニック横浜院",
    addr: "横浜市西区北幸１丁目１−８\nエキニア横浜 7F 705-2",
    map: "https://maps.google.com/?q=神奈川県横浜市西区北幸1丁目1-8",
    url: "https://yokohama.tifaclinic.jp/"
  },
  {
    pref: "大阪",
    name: "春次医院",
    addr: "大阪市中央区博労町２丁目６−１\n春次ビル",
    map: "https://maps.google.com/?q=大阪府大阪市中央区博労町２丁目６−１",
    url: null
  },
];

const prefOrder = ["北海道", "千葉", "東京", "横浜", "名古屋", "大阪", "福岡"];
const prefs = ["すべて", ...prefOrder.filter(p => clinics.some(c => c.pref === p))];
let active = "すべて";

const filtersEl = document.getElementById("filters");
const listEl = document.getElementById("list");

// SVG icons inline
const iconMap = `<svg class="addr-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>`;
const iconMapBtn = `<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>`;
const iconLink = `<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>`;

function renderFilters() {
  filtersEl.innerHTML = prefs.map(p =>
    `<button class="filter-btn${p === active ? " active" : ""}" data-p="${p}">${p}</button>`
  ).join("");
  filtersEl.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      active = btn.dataset.p;
      renderFilters();
      renderList();
    });
  });
}

function renderList() {
  const filtered = active === "すべて" ? clinics : clinics.filter(c => c.pref === active);
  if (!filtered.length) {
    listEl.innerHTML = '<div class="empty">— 該当するクリニックがありません —</div>';
    return;
  }
  const byPref = {};
  filtered.forEach(c => {
    if (!byPref[c.pref]) byPref[c.pref] = [];
    byPref[c.pref].push(c);
  });
  const orderedPrefs = prefOrder.filter(p => byPref[p]);
  listEl.innerHTML = orderedPrefs.map(pref => `
    <section class="pref-section">
      <div class="pref-heading-wrap">
        <h2 class="pref-heading">${pref}</h2>
        <div class="pref-heading-line"></div>
      </div>
      <div class="clinic-grid">
        ${byPref[pref].map(c => `
          <div class="clinic-card">
            <p class="clinic-name">${c.name}</p>
            <div class="clinic-name-line"></div>
            <div class="clinic-addr-block">
              ${iconMap}
              <span class="clinic-addr-text">${c.addr.replace(/\n/g, '<br>')}</span>
            </div>
            <div class="btn-row">
              <a class="map-link" href="${c.map}" target="_blank" rel="noopener">
                ${iconMapBtn}Google マップ
              </a>
              ${c.url ? `<a class="site-link" href="${c.url}" target="_blank" rel="noopener">
                ${iconLink}公式サイト
              </a>` : ""}
            </div>
            <span class="pref-tag">${c.pref}</span>
          </div>
        `).join("")}
      </div>
    </section>
  `).join("");
}

renderFilters();
renderList();
</script>

</body>
</html>
